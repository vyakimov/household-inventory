{% extends "base.html" %}
{% block title %}Inventory{% endblock %}
{% block content %}
<header class="mb-4">
  <p class="text-xs font-semibold uppercase tracking-[0.18em] text-muted">Household</p>
  <div class="flex items-baseline justify-between gap-3">
    <h1 class="font-display text-3xl font-bold tracking-tight">Inventory</h1>
    <span id="low-count" class="shrink-0 text-sm text-muted">{{ low_count }} running low</span>
  </div>
</header>
<div id="inventory-body">
  {% include "partials/inventory_body.html" %}
</div>
{% endblock %}
