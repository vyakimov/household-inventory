{% set labels = [('low', 'Low stock'), ('necessities', 'Necessities'), ('all', 'All')] %}
<div class="mb-3 flex rounded-2xl border border-line bg-surface p-1">
  {% for t, label in labels %}
  <button hx-get="/partials/inventory" hx-vals='{"tab": "{{ t }}"}' hx-include="[name=q]"
          hx-target="#inventory-body" hx-swap="innerHTML"
          class="flex-1 rounded-xl px-2 py-2 text-sm font-medium transition-colors {{ 'bg-basil text-white' if tab == t else 'text-muted' }}">
    {{ label }}{% if t == 'low' %}<span class="ml-1 tabular-nums {{ 'text-white/75' if tab == t else 'text-muted' }}">{{ low_count }}</span>{% endif %}
  </button>
  {% endfor %}
</div>

<input type="hidden" name="tab" value="{{ tab }}">
<div class="relative mb-4">
  <svg class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-muted" width="18" height="18"
       viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
    <circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/>
  </svg>
  <input name="q" value="{{ q }}" type="search" placeholder="Search items or aliases" autocomplete="off"
         hx-get="/partials/list" hx-include="[name=tab]" hx-target="#item-list" hx-swap="innerHTML"
         hx-trigger="input changed delay:250ms, search"
         class="w-full rounded-2xl border border-line bg-surface py-3 pl-10 pr-4 text-base placeholder:text-muted focus:border-basil focus:outline-none">
</div>

<div id="item-list">
  {% include "partials/item_list.html" %}
</div>
